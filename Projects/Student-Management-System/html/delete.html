<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Student</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --navy:        #0F1729;
  --navy-mid:    #1E2D4D;
  --navy-light:  #2A3F6F;
  --indigo:      #4F46E5;
  --indigo-pale: #EEF2FF;
  --green:       #10B981;
  --rose:        #EF4444;
  --rose-mid:    #DC2626;
  --rose-pale:   #FFF1F2;
  --rose-border: #FECDD3;
  --bg:          #F0F4FA;
  --surface:     #FFFFFF;
  --border:      #E2E8F0;
  --text-primary:   #0F1729;
  --text-secondary: #475569;
  --text-muted:     #94A3B8;
  --shadow-md:   0 4px 16px rgba(15,23,41,.08), 0 2px 6px rgba(15,23,41,.04);
  --radius-sm:   8px;
  --radius-md:   12px;
  --transition:  all .2s cubic-bezier(.4,0,.2,1);
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ───────────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
  color: white;
  padding: 0 40px;
  height: 68px;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(15,23,41,.4);
}

header h2 {
  font-size: 1.125rem;
  font-weight: 700;
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}

header h2::before {
  content: '';
  display: inline-block;
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--indigo), #818CF8);
  border-radius: 7px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(79,70,229,.5);
}

/* ── Container ────────────────────────────────────────────────── */
.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 56px 24px 56px;
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ── Card ─────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  overflow: hidden;
  animation: fadeUp .3s ease both .05s;
}

/* ── Warning Banner ───────────────────────────────────────────── */
.warning-banner {
  background: var(--rose-pale);
  border-bottom: 1px solid var(--rose-border);
  padding: 28px 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 14px;
}

.warning-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--rose-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  box-shadow: 0 2px 8px rgba(239,68,68,.15);
  flex-shrink: 0;
}

.warning-banner h1 {
  font-size: 1.1875rem;
  font-weight: 800;
  letter-spacing: -.3px;
  color: var(--rose-mid);
}

.warning-banner p {
  font-size: .8125rem;
  color: #9F1239;
  max-width: 340px;
  line-height: 1.6;
}

/* ── Student Summary ──────────────────────────────────────────── */
.student-summary {
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}

.summary-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--indigo), #818CF8);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: .9375rem;
  font-weight: 800;
  color: white;
  letter-spacing: -.5px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(79,70,229,.3);
}

.summary-info {
  flex: 1;
}

.summary-name {
  font-size: .9375rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 3px;
}

.summary-meta {
  font-size: .75rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.summary-meta span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.summary-meta span::before {
  content: '·';
  color: var(--border);
}

.summary-meta span:first-child::before { display: none; }

.course-badge {
  display: inline-block;
  background: var(--indigo-pale);
  color: var(--indigo);
  font-size: .6375rem;
  font-weight: 700;
  letter-spacing: .04em;
  padding: 2px 8px;
  border-radius: 50px;
}

/* ── Detail List ──────────────────────────────────────────────── */
.detail-list {
  padding: 20px 32px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .8125rem;
  gap: 12px;
}

.detail-row .dl {
  font-weight: 600;
  color: var(--text-muted);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  flex-shrink: 0;
}

.detail-row .dv {
  font-weight: 600;
  color: var(--text-secondary);
  text-align: right;
}

.detail-row .dv.mono {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: .75rem;
  color: var(--indigo);
  letter-spacing: .04em;
}

/* ── Actions ──────────────────────────────────────────────────── */
.actions {
  padding: 20px 32px 24px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* Confirm Delete — solid rose */
#confirmDeleteBtn {
  background: var(--rose);
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: .8125rem;
  font-family: inherit;
  font-weight: 700;
  letter-spacing: .01em;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(239,68,68,.25);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

#confirmDeleteBtn:hover {
  background: var(--rose-mid);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(239,68,68,.4);
}

#confirmDeleteBtn:active { transform: translateY(0); }

#confirmDeleteBtn:disabled {
  opacity: .6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* Cancel — ghost */
.btn-cancel {
  text-decoration: none;
  background: transparent;
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-size: .8125rem;
  font-weight: 600;
  letter-spacing: .01em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
}

.btn-cancel::before { content: '←'; font-size: .875rem; }

.btn-cancel:hover {
  background: var(--bg);
  color: var(--text-primary);
  border-color: #CBD5E1;
}

/* ── Animation ────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 640px) {
  header {
    padding: 0 20px;
    height: 60px;
  }

  header h2 { font-size: .9375rem; }

  .container { padding: 32px 16px 40px; }

  .warning-banner,
  .student-summary,
  .detail-list,
  .actions {
    padding-left: 20px;
    padding-right: 20px;
  }

  .actions { flex-direction: column; }

  #confirmDeleteBtn,
  .btn-cancel { justify-content: center; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    transition-duration: .001ms !important;
  }
}
</style>
</head>
<body>

<header>
  <h2>Student Management System</h2>
</header>

<div class="container">
  <div class="card">

    <!-- Warning Banner -->
    <div class="warning-banner">
      <div class="warning-icon">⚠️</div>
      <h1>Delete Student</h1>
      <p>This action is permanent and cannot be undone. The student record and all associated data will be removed.</p>
    </div>

    <!-- Student Summary -->
    <div class="student-summary">
      <div class="summary-avatar" id="deleteAvatarInitials"></div>
      <div class="summary-info">
        <div class="summary-name" id="deleteStudentName"></div>
        <div class="summary-meta">
          <span id="deleteStudentId"></span>
          <span><span class="course-badge" id="deleteStudentCourse"></span></span>
          <span id="deleteStudentYear"></span>
        </div>
      </div>
    </div>

    <!-- Detail Rows -->
    <div class="detail-list">
      <div class="detail-row">
        <span class="dl">Student ID</span>
        <span class="dv mono" id="deleteDetailId"></span>
      </div>
      <div class="detail-row">
        <span class="dl">Email</span>
        <span class="dv" id="deleteDetailEmail"></span>
      </div>
      <div class="detail-row">
        <span class="dl">Course</span>
        <span class="dv" id="deleteDetailCourse"></span>
      </div>
      <div class="detail-row">
        <span class="dl">Year Level</span>
        <span class="dv" id="deleteDetailYear"></span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button type="button" id="confirmDeleteBtn" onclick="deleteStudent()">Delete Student</button>
      <a href="/students" class="btn-cancel">Cancel</a>
    </div>

  </div>
</div>

</body>
<script>
    const id = window.location.pathname.split('/')[2]
    
    fetch(`/students/${id}/remove`).then(res => res.json()).then(data => {
        const initial = data.firstName.charAt(0) + data.lastName.charAt(0)
        document.getElementById('deleteAvatarInitials').textContent = initial
        document.getElementById('deleteStudentName').textContent = `${data.firstName} ${data.lastName}`
        document.getElementById('deleteStudentId').textContent = data.studentID
        document.getElementById('deleteStudentCourse').textContent = data.course
        document.getElementById('deleteStudentYear').textContent = data.yearLvl 
        document.getElementById('deleteDetailId').textContent = data.studentID
        document.getElementById('deleteDetailEmail').textContent = data.email
        document.getElementById('deleteDetailCourse').textContent = data.course
        document.getElementById('deleteDetailYear').textContent = data.yearLvl
    })
    const deleteStudent = async () => {
        const res = await fetch(`/students/${id}/delete`, {
            method: 'DELETE'
        })
        if (res.ok) {
            window.location.href = '/students'
        }
    }
</script>
</html>

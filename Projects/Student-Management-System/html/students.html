<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
:root {
  --navy:        #0F1729;
  --navy-mid:    #1E2D4D;
  --navy-light:  #2A3F6F;
  --indigo:      #4F46E5;
  --indigo-dark: #3730A3;
  --indigo-pale: #EEF2FF;
  --green:       #10B981;
  --green-pale:  #ECFDF5;
  --amber:       #F59E0B;
  --amber-pale:  #FFFBEB;
  --rose:        #EF4444;
  --rose-pale:   #FFF1F2;
  --bg:          #F0F4FA;
  --surface:     #FFFFFF;
  --border:      #E2E8F0;
  --text-primary:   #0F1729;
  --text-secondary: #475569;
  --text-muted:     #94A3B8;
  --shadow-sm:   0 1px 3px rgba(15,23,41,.06), 0 1px 2px rgba(15,23,41,.04);
  --shadow-md:   0 4px 16px rgba(15,23,41,.08), 0 2px 6px rgba(15,23,41,.04);
  --shadow-lg:   0 8px 32px rgba(15,23,41,.12), 0 4px 12px rgba(15,23,41,.06);
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --transition:  all .2s cubic-bezier(.4,0,.2,1);
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
}
body {
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
  color: white;
  padding: 0 40px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(15,23,41,.4);
}
header h2 {
  font-size: 1.125rem;
  font-weight: 700;
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}
header h2::before {
  content: '';
  display: inline-block;
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--indigo), #818CF8);
  border-radius: 7px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(79,70,229,.5);
}
.container {
  max-width: 1260px;
  margin: 0 auto;
  padding: 32px 24px 48px;
  flex: 1;
  width: 100%;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  gap: 16px;
  flex-wrap: wrap;
}
.top-bar h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--text-primary);
}
.count {
  font-size: .8125rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.count::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
}
.btn {
  text-decoration: none;
  background: var(--indigo);
  color: white;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: .8125rem;
  letter-spacing: .01em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(79,70,229,.25);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '+';
  font-size: 1.1rem;
  font-weight: 400;
  line-height: 1;
  margin-right: 2px;
}
.btn:hover {
  background: var(--indigo-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(79,70,229,.4);
}
.btn:active { transform: translateY(0); }
.card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  overflow: hidden;
  animation: fadeUp .3s ease both .05s;
}
.table-wrapper {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 640px;
}
thead tr {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
th {
  padding: 11px 16px;
  text-align: left;
  font-size: .6875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  white-space: nowrap;
  user-select: none;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--indigo-pale); }
td {
  padding: 14px 16px;
  font-size: .8125rem;
  color: var(--text-secondary);
  vertical-align: middle;
}
td:first-child {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: .75rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: .02em;
}
td:nth-child(2) {
  font-weight: 700;
  color: var(--text-primary);
}
td:nth-child(3) span,
td:nth-child(3) {
  display: inline-flex;
  align-items: center;
}
.course-badge {
  display: inline-block;
  background: var(--indigo-pale);
  color: var(--indigo);
  font-size: .6875rem;
  font-weight: 700;
  letter-spacing: .04em;
  padding: 3px 9px;
  border-radius: 50px;
  white-space: nowrap;
}
td:nth-child(4) {
  color: var(--text-secondary);
  font-size: .8rem;
}
td:nth-child(5) {
  color: var(--text-muted);
  font-size: .8rem;
}
.actions {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
}
.view, .edit, .delete {
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .02em;
  transition: var(--transition);
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}
.view {
  background: var(--green-pale);
  color: var(--green);
}
.view:hover {
  background: var(--green);
  color: white;
  box-shadow: 0 2px 8px rgba(16,185,129,.3);
}
.edit {
  background: var(--amber-pale);
  color: var(--amber);
}
.edit:hover {
  background: var(--amber);
  color: white;
  box-shadow: 0 2px 8px rgba(245,158,11,.3);
}
.delete {
  background: var(--rose-pale);
  color: var(--rose);
}
.delete:hover {
  background: var(--rose);
  color: white;
  box-shadow: 0 2px 8px rgba(239,68,68,.3);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.top-bar { animation: fadeUp .25s ease both; }
.count   { animation: fadeUp .28s ease both .02s; }
@media (max-width: 640px) {
  header {
    padding: 0 20px;
    height: 60px;
  }
  header h2 {
    font-size: .9375rem;
  }
  .container {
    padding: 20px 16px 40px;
  }
  .top-bar h1 {
    font-size: 1.25rem;
  }
  .actions {
    flex-direction: column;
    gap: 4px;
  }
  .view, .edit, .delete {
    justify-content: center;
    padding: 5px 10px;
  }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    transition-duration: .001ms !important;
  }
}
</style>
</head>
<body>
    <header>
        <h2>Student Management System</h2>
    </header>
    <div class="container">
        <div class="top-bar">
            <h1>All Students</h1>
            <a href="/students/new" class="btn">Add Student</a>
        </div>
        <p class="count" id="count"></p>
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Year Level</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
<script>
  fetch('/students/all').then(res => res.json()).then(data => {
    const student = data.studentRows
    const total = data.totalNum

    const studentList = student.map(student => {
      return`
      <tr>
          <td>${student.studentID}</td>
          <td>${student.firstName} ${student.lastName}</td>
          <td><span class="course-badge">${student.course}</span></td>
          <td>${student.yearLvl}</td>
          <td>${student.email}</td>
          <td>
            <div class="actions">
              <a href="/students/${student.studentID}" class="view">View</a>
              <a href="/students/${student.studentID}/edit" class="edit">Edit</a>
              <a href="/students/${student.studentID}/delete" class="delete">Delete</a>
            </div>
          </td>
      </tr>
      `
    }).join('')
    document.getElementById('count').textContent = `Total Students: ${total}`
    document.querySelector('tbody').innerHTML = studentList
  })
</script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --navy:        #0F1729;
  --navy-mid:    #1E2D4D;
  --navy-light:  #2A3F6F;
  --indigo:      #4F46E5;
  --indigo-dark: #3730A3;
  --indigo-pale: #EEF2FF;
  --green:       #10B981;
  --green-pale:  #ECFDF5;
  --amber:       #F59E0B;
  --amber-pale:  #FFFBEB;
  --rose:        #EF4444;
  --rose-pale:   #FFF1F2;
  --slate:       #64748B;
  --slate-pale:  #F8FAFC;
  --bg:          #F0F4FA;
  --surface:     #FFFFFF;
  --border:      #E2E8F0;
  --text-primary:   #0F1729;
  --text-secondary: #475569;
  --text-muted:     #94A3B8;
  --shadow-sm:   0 1px 3px rgba(15,23,41,.06), 0 1px 2px rgba(15,23,41,.04);
  --shadow-md:   0 4px 16px rgba(15,23,41,.08), 0 2px 6px rgba(15,23,41,.04);
  --shadow-lg:   0 8px 32px rgba(15,23,41,.12), 0 4px 12px rgba(15,23,41,.06);
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --transition:  all .2s cubic-bezier(.4,0,.2,1);
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ───────────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
  color: white;
  padding: 0 40px;
  height: 68px;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(15,23,41,.4);
}

header h2 {
  font-size: 1.125rem;
  font-weight: 700;
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}

header h2::before {
  content: '';
  display: inline-block;
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--indigo), #818CF8);
  border-radius: 7px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(79,70,229,.5);
}

/* ── Container ────────────────────────────────────────────────── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 36px 24px 56px;
  flex: 1;
  width: 100%;
}

/* ── Card ─────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  animation: fadeUp .3s ease both .05s;
}

/* ── Profile Header ───────────────────────────────────────────── */
.profile-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 55%, var(--navy-light) 100%);
  color: white;
  padding: 36px 40px;
  display: flex;
  align-items: center;
  gap: 28px;
  position: relative;
  overflow: hidden;
}

/* Decorative circle */
.profile-header::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -60px;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
  pointer-events: none;
}

.profile-header::after {
  content: '';
  position: absolute;
  bottom: -80px;
  right: 80px;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: rgba(79,70,229,.15);
  pointer-events: none;
}

/* ── Avatar ───────────────────────────────────────────────────── */
.avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--indigo), #818CF8);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.625rem;
  font-weight: 800;
  letter-spacing: -.5px;
  color: white;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(79,70,229,.5), 0 0 0 3px rgba(255,255,255,.15);
  position: relative;
  z-index: 1;
}

/* ── Profile Info ─────────────────────────────────────────────── */
.profile-info {
  position: relative;
  z-index: 1;
}

.profile-info h1 {
  font-size: 1.625rem;
  font-weight: 800;
  letter-spacing: -.5px;
  margin-bottom: 6px;
  color: white;
}

.profile-info p {
  font-size: .8125rem;
  color: rgba(255,255,255,.65);
  margin-bottom: 4px;
}

.profile-info p:last-child {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
}

/* Course pill in header */
.course-pill {
  display: inline-block;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.18);
  color: white;
  font-size: .6875rem;
  font-weight: 700;
  letter-spacing: .05em;
  padding: 2px 10px;
  border-radius: 50px;
}

/* Active status pill in header */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: .6875rem;
  font-weight: 700;
  letter-spacing: .04em;
  padding: 2px 10px;
  border-radius: 50px;
}
.status-pill::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  display: block;
}
.active {
    background: rgba(16,185,129,.18);
    border: 1px solid rgba(16,185,129,.3);
    color: rgb(110, 231, 183);
}
.active::before {
  background: var(--green);
}
.inactive {
  background: rgba(99, 102, 241, .18);
  border: 1px solid rgba(99, 102, 241, .3);
  color: rgb(165, 180, 252);
}
.inactive::before {
  background: var(--indigo);
}
.dropped {
  background: rgba(244, 63, 94, .18);
  border: 1px solid rgba(244, 63, 94, .3);
  color: rgb(253, 164, 175);
}
.dropped::before {
  background: var(--rose);
}
.graduated {
  background: rgba(245, 158, 11, .18);
  border: 1px solid rgba(245, 158, 11, .3);
  color: rgb(252, 211, 77);
}
.graduated::before {
  background: var(--amber);
}
/* ── Content Area ─────────────────────────────────────────────── */
.content {
  padding: 32px 40px 28px;
}

/* ── Section Title ────────────────────────────────────────────── */
.section-title {
  font-size: .6875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

/* ── Detail Grid ──────────────────────────────────────────────── */
.details {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.detail {
  background: var(--bg);
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: var(--transition);
}

.detail:hover {
  border-color: #CBD5E1;
  background: var(--indigo-pale);
}

.label {
  font-size: .6875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.value {
  font-weight: 700;
  color: var(--text-primary);
  font-size: .875rem;
}

/* Student ID — monospace */
.detail:first-child .value {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: .8125rem;
  color: var(--indigo);
  letter-spacing: .04em;
}

/* Status value — inline badge */
.status-value {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.status-value::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: block;
  flex-shrink: 0;
}
.Active {
  color: var(--green);
}
.Active::before {
  background: var(--green);
}
.Inactive {
  color: var(--indigo);
}
.Inactive::before {
  background: var(--indigo);
}
.Dropped {
  color: var(--rose);
}
.Dropped::before {
  background: var(--rose);
}
.Graduated {
  color: var(--amber);
}
.Graduated::before {
  background: var(--amber);
}
/* Full-width address cell */
[style*="span 2"] {
  grid-column: span 2;
}

/* ── Actions ──────────────────────────────────────────────────── */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.btn {
  text-decoration: none;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: .8125rem;
  letter-spacing: .01em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  white-space: nowrap;
}

.back {
  background: transparent;
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
}
.back::before { content: '←'; font-size: .875rem; }
.back:hover {
  background: var(--bg);
  color: var(--text-primary);
  border-color: #CBD5E1;
}

.edit {
  background: var(--amber-pale);
  color: var(--amber);
  border: 1.5px solid transparent;
}
.edit:hover {
  background: var(--amber);
  color: white;
  box-shadow: 0 2px 10px rgba(245,158,11,.35);
  transform: translateY(-1px);
}

.delete {
  background: var(--rose-pale);
  color: var(--rose);
  border: 1.5px solid transparent;
}
.delete:hover {
  background: var(--rose);
  color: white;
  box-shadow: 0 2px 10px rgba(239,68,68,.35);
  transform: translateY(-1px);
}

.btn:active { transform: translateY(0); }

/* ── Animation ────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 640px) {
  header {
    padding: 0 20px;
    height: 60px;
  }

  header h2 { font-size: .9375rem; }

  .container {
    padding: 20px 16px 40px;
  }

  .profile-header {
    flex-direction: column;
    align-items: flex-start;
    padding: 28px 24px;
    gap: 18px;
  }

  .avatar {
    width: 72px;
    height: 72px;
    font-size: 1.375rem;
  }

  .profile-info h1 {
    font-size: 1.25rem;
  }

  .content {
    padding: 24px 20px 20px;
  }

  .details {
    grid-template-columns: 1fr;
  }

  [style*="span 2"] {
    grid-column: span 1;
  }

  .actions {
    flex-direction: column;
  }

  .btn {
    justify-content: center;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    transition-duration: .001ms !important;
  }
}
</style>
</head>
<body>

<header>
  <h2>Student Management System</h2>
</header>

<div class="container">
  <div class="card">

    <div class="profile-header">
      <div class="avatar"></div>
      <div class="profile-info">
        <h1 id="studentName"></h1>
        <p id="studentID"></p>
        <p>
          <span class="course-pill" id="courseYear"></span>
          <span class="status-pill" id="status">Active</span>
        </p>
      </div>
    </div>

    <div class="content">

      <h2 class="section-title">Student Information</h2>

      <div class="details">

        <div class="detail">
          <div class="label">Student ID</div>
          <div class="value" id="id"></div>
        </div>

        <div class="detail">
          <div class="label">Full Name</div>
          <div class="value" id="fullName"></div>
        </div>

        <div class="detail">
          <div class="label">Email Address</div>
          <div class="value" id="email"></div>
        </div>

        <div class="detail">
          <div class="label">Course</div>
          <div class="value" id="course"></div>
        </div>

        <div class="detail">
          <div class="label">Year Level</div>
          <div class="value" id="yearLvl"></div>
        </div>

        <div class="detail">
          <div class="label">Birth Date</div>
          <div class="value" id="birth"></div>
        </div>

        <div class="detail">
          <div class="label">Contact Number</div>
          <div class="value" id="contactNum"></div>
        </div>

        <div class="detail">
          <div class="label">Status</div>
          <div class="value"><span class="status-value" id="stat"></span></div>
        </div>

        <div class="detail" style="grid-column: span 2;">
          <div class="label">Address</div>
          <div class="value" id="address"></div>
        </div>
      </div>
      <div class="actions">
        
      </div>
    </div>
  </div>
</div>

</body>
<script>
  const id = window.location.pathname.split('/')[2]
  function updateStatusClass(element, studentStatus) {
    element.classList.remove('active', 'inactive', 'dropped', 'graduated')
    element.classList.add(studentStatus.toLowerCase())
  }
  function updatesStatusClass(element, studentStatus) {
    element.classList.remove('active', 'inactive', 'dropped', 'graduated')
    element.classList.add(studentStatus)
  }

  fetch(`/students/${id}/view`).then(res => res.json()).then(data => {
    const status = document.querySelector('.status-pill')
    const stats = document.querySelector('.status-value')

    const firstName = data.firstName.charAt(0)
    const lastName = data.lastName.charAt(0)
    const avatar = firstName + lastName
    const button = 
    `
      <a href="/students" class="btn back">Back</a>
      <a href="/students/${id}/edit" class="btn edit">Edit Student</a>
      <a href="/students/${id}/delete" class="btn delete">Delete Student</a>
    `

    document.querySelector('.avatar').textContent = avatar
    document.getElementById('studentName').textContent = `${data.firstName} ${data.lastName}`
    document.getElementById('studentID').textContent = `Student ID: ${data.studentID}`
    document.getElementById('courseYear').textContent = `${data.course} · ${data.yearLvl}`
    document.getElementById('status').textContent = `${data.studentStatus}`
    document.getElementById('id').textContent = data.studentID
    document.getElementById('fullName').textContent = `${data.firstName} ${data.lastName}`
    document.getElementById('email').textContent = data.email
    document.getElementById('course').textContent = data.course
    document.getElementById('yearLvl').textContent = data.yearLvl
    document.getElementById('birth').textContent = data.birthday
    document.getElementById('contactNum').textContent = data.contactNumber
    document.getElementById('stat').textContent = data.studentStatus
    document.getElementById('address').textContent = data.address
    document.querySelector('.actions').innerHTML = button
    updateStatusClass(status, data.studentStatus)
    updatesStatusClass(stats, data.studentStatus)
})
</script>

</html>
